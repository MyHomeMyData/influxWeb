<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>influxWeb</title>
  <link rel="stylesheet" href="/vendor/tabulator.min.css" />
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body>
  <header>
    <h1>influxWeb</h1>
    <form id="query-form">
      <label>
        Bucket
        <select id="bucket-select"></select>
      </label>
      <label>
        Range start
        <input id="range-start" type="text" value="-1h" />
      </label>
      <label>
        Range stop
        <input id="range-stop" type="text" value="now()" />
      </label>
      <button id="apply-query" type="submit">Apply</button>
    </form>
    <span class="utc-note">All times shown here are UTC.</span>
  </header>

  <main>
    <section id="selection-panel">
      <h2>Browse / filter</h2>
      <p class="status-line">
        Click to select, Ctrl+click to add/remove, Shift+click to select a range.
        Alt+click a measurement to expand its tags.
      </p>
      <div class="search-row">
        <input id="schema-search" type="text" placeholder="Filter..." />
        <button id="clear-selection" title="Clear filter and selection">&times;</button>
      </div>
      <div id="schema-tree"></div>
    </section>

    <section id="results-panel">
      <div class="toolbar">
        <button id="export-ods">Export ODS</button>
        <button id="import-ods">Import ODS</button>
        <button id="add-point">+ Add point</button>
        <button id="retime-in-range">Retime in range</button>
        <button id="delete-in-range" class="danger">Delete in range</button>
      </div>
      <p id="status-line" class="status-line"></p>
      <div id="results-table"></div>
    </section>
  </main>

  <div id="delete-modal" class="modal-overlay">
    <div class="modal-box">
      <h2>Delete points</h2>
      <div id="delete-modal-body"></div>
      <div class="modal-actions">
        <button id="delete-modal-cancel">Cancel</button>
        <button id="delete-modal-confirm" class="danger" disabled>Delete permanently</button>
      </div>
    </div>
  </div>

  <div id="edit-modal" class="modal-overlay">
    <div class="modal-box">
      <h2>Edit value</h2>
      <div id="edit-modal-body"></div>
      <div class="modal-actions">
        <button id="edit-modal-cancel">Cancel</button>
        <button id="edit-modal-confirm">Save</button>
      </div>
    </div>
  </div>

  <div id="add-point-modal" class="modal-overlay">
    <div class="modal-box">
      <h2>Add point</h2>
      <label>
        Measurement
        <input id="add-point-measurement" type="text" />
      </label>
      <div id="add-point-tag-rows"></div>
      <button id="add-point-add-tag" type="button">+ Add tag</button>
      <label>
        Field
        <input id="add-point-field" type="text" />
      </label>
      <label>
        Value
        <input id="add-point-value" type="text" />
      </label>
      <label>
        Type
        <select id="add-point-type">
          <option value="float">float</option>
          <option value="int">int</option>
          <option value="bool">boolean</option>
          <option value="string">string</option>
        </select>
      </label>
      <label>
        Time
        <input id="add-point-time" type="text" />
      </label>
      <p id="add-point-error" class="status-line error"></p>
      <div class="modal-actions">
        <button id="add-point-cancel">Cancel</button>
        <button id="add-point-confirm">Add</button>
      </div>
    </div>
  </div>

  <div id="retime-modal" class="modal-overlay">
    <div class="modal-box">
      <h2>Retime points</h2>
      <label>
        <input type="radio" name="retime-mode" id="retime-mode-offset" checked />
        Shift by an offset
      </label>
      <label>
        <input type="radio" name="retime-mode" id="retime-mode-normalize" />
        Normalize to start of...
      </label>
      <div id="retime-offset-fields">
        <label>
          Amount (use a negative number to shift backwards)
          <input id="retime-offset-amount" type="number" step="1" value="1" />
        </label>
        <label>
          Unit
          <select id="retime-offset-unit">
            <option value="minutes">minutes</option>
            <option value="hours">hours</option>
            <option value="days" selected>days</option>
            <option value="weeks">weeks</option>
            <option value="months">months</option>
            <option value="years">years</option>
          </select>
        </label>
      </div>
      <div id="retime-normalize-fields" style="display: none">
        <label>
          Granularity
          <select id="retime-normalize-granularity">
            <option value="minute">minute</option>
            <option value="hour">hour</option>
            <option value="day" selected>day</option>
            <option value="week">week (Monday)</option>
            <option value="month">month</option>
            <option value="year">year</option>
          </select>
        </label>
      </div>
      <p id="retime-modal-error" class="status-line error"></p>
      <div class="modal-actions">
        <button id="retime-modal-cancel">Cancel</button>
        <button id="retime-modal-confirm">Next</button>
      </div>
    </div>
  </div>

  <div id="retime-confirm-modal" class="modal-overlay">
    <div class="modal-box">
      <h2>Confirm retime</h2>
      <div id="retime-confirm-modal-body"></div>
      <div class="modal-actions">
        <button id="retime-confirm-modal-cancel">Cancel</button>
        <button id="retime-confirm-modal-confirm" disabled>Retime</button>
      </div>
    </div>
  </div>

  <div id="import-modal" class="modal-overlay">
    <div class="modal-box">
      <h2>Import ODS</h2>
      <label>
        File
        <input id="import-file" type="file" accept=".ods" />
      </label>
      <div id="import-modal-body"></div>
      <div class="modal-actions">
        <button id="import-modal-cancel">Cancel</button>
        <button id="import-modal-confirm" disabled>Import</button>
      </div>
    </div>
  </div>

  <script src="/vendor/tabulator.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/state.js"></script>
  <script src="/js/bucket_select.js"></script>
  <script src="/js/filter_builder.js"></script>
  <script src="/js/table.js"></script>
  <script src="/js/modals/delete_confirm.js"></script>
  <script src="/js/modals/edit_confirm.js"></script>
  <script src="/js/modals/add_point.js"></script>
  <script src="/js/modals/retime_confirm.js"></script>
  <script src="/js/modals/retime_bulk.js"></script>
  <script src="/js/modals/import_ods.js"></script>
  <script src="/js/main.js"></script>
</body>
</html>
